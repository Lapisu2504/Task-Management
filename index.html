<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>プログラム開発タスク管理</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>タスク管理</h1>
    <div class="top-bar">
      <input id="categoryInput" placeholder="カテゴリ名" />
      <button id="addButton" onclick="addCategory()">カテゴリ追加</button>
      <label for="sortSelect">ソート:</label>
      <select id="sortSelect" onchange="changeSortMode(this.value)">
        <option value="added_new">新しい順</option>
        <option value="added_old">古い順</option>
        <option value="name">名前順</option>
      </select>
    </div>

    <div id="categories"></div>

    <script src="script.js"></script>
  </body>
</html>
